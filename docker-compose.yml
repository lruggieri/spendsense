  spendsense:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    container_name: spendsense-app
    env_file:
      - .env
    ports:
      - "5678:5678"
    volumes:
      # Mount data directory for persistent storage
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/transactions.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped
