[pytest]
# Custom markers
markers =
    llm: marks tests as requiring LLM API calls (expensive, run with -m llm)
    slow: marks tests as slow running (deselect with '-m "not slow"')

# By default, skip LLM tests unless explicitly requested
addopts = -m "not llm"

# Test discovery (tests/manual/ requires explicit invocation)
testpaths = tests
collect_ignore_glob = tests/manual/*
python_files = test_*.py
python_classes = Test*
python_functions = test_*
