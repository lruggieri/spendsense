[mypy]
# Very gradual typing approach - minimal enforcement for initial adoption
# Focus on catching critical runtime errors without blocking development

# Basic configuration
python_version = 3.12
warn_return_any = False
warn_unused_configs = True

# Very permissive - only catch the most critical errors
check_untyped_defs = False
warn_no_return = False
# Allow implicit Optional for gradual adoption
allow_untyped_defs = True
allow_incomplete_defs = True
allow_untyped_calls = True

# Output formatting
show_error_codes = True
show_error_context = True
pretty = True
color_output = True

# Paths to type-check (production code only)
files = presentation/, infrastructure/, application/, domain/

# Per-module configuration
[mypy-tests.*]
# Tests can be even less strict
disallow_untyped_defs = False
disallow_untyped_calls = False

# Third-party libraries without type stubs
[mypy-flask.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

[mypy-googleapiclient.*]
ignore_missing_imports = True

[mypy-werkzeug.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-google_auth_oauthlib.*]
ignore_missing_imports = True

[mypy-uuid6.*]
ignore_missing_imports = True

[mypy-currency_converter.*]
ignore_missing_imports = True

[mypy-apscheduler.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

# Ignore problematic modules with many type issues
[mypy-config.*]
ignore_errors = True

[mypy-tests.manual_classifier_test]
ignore_errors = True

[mypy-infrastructure.cache.redis_cache_manager]
ignore_errors = True

[mypy-infrastructure.db_query_logger]
ignore_errors = True

[mypy-infrastructure.llm.*]
ignore_errors = True
